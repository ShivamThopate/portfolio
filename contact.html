<!-- Contact Section -->
<section class="section contact">
  <div class="container">
    <h2 class="section-title">GET IN TOUCH</h2>

    <div class="contact-grid fade-in">

      <!-- Left: Contact Info -->
      <div class="contact-info-box">
        <h3>Reach Out</h3>
        <p class="contact-description">Whether it's a collaboration, opportunity, or a casual hello, I'm just a message away!</p>

        <div class="contact-detail">
          <i class="fas fa-envelope"></i>
          <span>kethandosapati@gmail.com</span>
        </div>
        <div class="contact-detail">
          <i class="fas fa-map-marker-alt"></i>
          <span>New Jersey, USA</span>
        </div>

        <div class="contact-socials">
          <a href="https://github.com/DKethan" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
          <a href="https://www.linkedin.com/in/kethan-dosapati/" target="_blank" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
          <a href="https://medium.com/@kethandosapati" target="_blank" title="Medium"><i class="fab fa-medium"></i></a>
          <a href="https://huggingface.co/DKethan" target="_blank"><i class="fas fa-robot"></i></a>
        </div>
      </div>

      <!-- Right: Form -->
      <div class="contact-form-box">
        <form action="https://formspree.io/f/xvgazbld" method="POST" class="contact-form">
          <input type="text" name="name" placeholder="Full Name" required>
          <input type="email" name="email" placeholder="Email Address" required>
          <input type="text" name="subject" placeholder="Subject (optional)">
          <textarea name="message" placeholder="Type your message..." rows="5" required></textarea>
          <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
      </div>

    </div>
  </div>
</section>
