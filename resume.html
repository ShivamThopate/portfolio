<!-- Resume-specific mobile enhancements -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  const iframe = document.querySelector('.resume-embed iframe');
  const resumeEmbed = document.querySelector('.resume-embed');
  
  // Add haptic feedback for mobile button taps (if supported)
  const buttons = document.querySelectorAll('.resume-actions .btn');
  buttons.forEach(button => {
    button.addEventListener('touchstart', function() {
      if (navigator.vibrate) {
        navigator.vibrate(50);
      }
      this.style.transform = 'scale(0.98)';
    });
    
    button.addEventListener('touchend', function() {
      setTimeout(() => {
        this.style.transform = '';
      }, 150);
    });
  });
  
  // Mobile-optimized iframe handling
  function optimizeResumeForMobile() {
    if (iframe && resumeEmbed) {
      // Calculate full available height
      const viewportHeight = window.innerHeight;
      const navbarHeight = 80;
      const actionsHeight = 100;
      const titleHeight = 60; // Account for "RESUME" title
      const padding = 20; // Reduced padding
      
      const availableHeight = viewportHeight - navbarHeight - actionsHeight - titleHeight - padding;
      
      if (window.innerWidth <= 768) {
        // Mobile: Fill most of the screen
        const mobileHeight = Math.max(availableHeight * 0.9, 500);
        resumeEmbed.style.height = mobileHeight + 'px';
      } else if (window.innerWidth <= 1024) {
        // Tablet: Fill available space
        const tabletHeight = Math.max(availableHeight * 0.85, 700);
        resumeEmbed.style.height = tabletHeight + 'px';
      } else {
        // Desktop: Fill most available space or minimum 1000px
        const desktopHeight = Math.max(availableHeight * 0.8, 1000);
        resumeEmbed.style.height = desktopHeight + 'px';
      }
      
      // Ensure iframe fills container completely
      iframe.style.width = '100%';
      iframe.style.height = '100%';
      iframe.style.border = 'none';
      iframe.style.background = 'transparent';
      iframe.style.display = 'block';
    }
  }
  
  // Run optimization on load and resize
  optimizeResumeForMobile();
  window.addEventListener('resize', optimizeResumeForMobile);
  window.addEventListener('orientationchange', function() {
    setTimeout(optimizeResumeForMobile, 100);
  });
  
  // Improve scroll behavior
  if ('scrollBehavior' in document.documentElement.style) {
    document.documentElement.style.scrollBehavior = 'smooth';
  }
});
</script>
