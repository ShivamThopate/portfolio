<section class="section contact">

    <!-- Reach Out (first) -->

      <h3>Reach Out</h3>
      <p class="contact-description">Open to Software Engineer & AI Specialist, Machine Learning, and Full-Stack development opportunities. Email is the fastest way to reach me.</p>

      </div>

    <!-- Contact Form (third) -->
    <div class="contact-form-box fade-in">
      <form id="contact-form" action="https://formspree.io/f/xpqvwbwe" method="POST" class="contact-form">
        <label for="contact-name" class="visually-hidden">Full Name</label>
        <input type="text" id="contact-name" name="name" placeholder="Full Name" required>
        <label for="contact-email" class="visually-hidden">Email Address</label>
        <input type="email" id="contact-email" name="email" placeholder="Email Address" required>
        <label for="contact-subject" class="visually-hidden">Subject (optional)</label>
        <input type="text" id="contact-subject" name="subject" placeholder="Subject (optional)">
        <label for="contact-message" class="visually-hidden">Type your message</label>
        <textarea id="contact-message" name="message" placeholder="Type your message..." rows="5" required></textarea>
        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>
    </div>
